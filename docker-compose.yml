# docker-CodeAlkimia — entorno de desarrollo local e infraestructura de despliegue
#
# Filosofía (ver CodeAlkimia/docs/04-arquitectura.md §1 y §9):
#   - En el host solo Docker. Build, tests y runtime pasan por containers.
#   - Un container por componente de infraestructura, con healthcheck.
#   - Volúmenes nombrados para los datos; configs bind-monteados
#     (gotcha: tras editar un config bind-monteado, `docker compose restart <svc>` —
#     los editores atómicos cambian el inode y el hot-reload miente).
#   - Credenciales de desarrollo descartables. En producción, OpenBao.
#
# Convive con el stack de MTF en la misma máquina SOLO de a uno por vez
# (comparten puertos estándar: 5432, 8200, 9090, 3000, etc.).

name: docker-codealkimia

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 — base primaria: dominio, ledger (hash chain), cola pg-boss.
  # El esquema lo gestionan las migraciones de la aplicación (node-pg-migrate);
  # acá solo se crea la base y el usuario de desarrollo.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: cak-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # SeaweedFS — object storage S3-compatible (adoptado por spike, decisión #26).
  # Guarda los blobs: código ingerido/migrado, evidencia, golden masters,
  # cuerpos de llamadas LLM. Métricas Prometheus nativas en :9324 (sin exporter).
  # Nota de cliente SDK: requestChecksumCalculation/responseChecksumValidation
  # = "WHEN_REQUIRED" (ver spikes/seaweedfs/README.md).
  # ---------------------------------------------------------------------------
  seaweedfs:
    image: chrislusf/seaweedfs:4.39
    container_name: cak-seaweedfs
    command:
      - server
      - -dir=/data
      - -s3
      - -s3.config=/etc/seaweedfs/s3.json
      - -metricsPort=9324
    ports:
      - "8333:8333"   # API S3
    volumes:
      - seaweed_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      # weed bindea en la IP del container (no en localhost) → healthcheck por hostname.
      test: ["CMD-SHELL", "wget -q --spider http://$$(hostname):9333/cluster/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # OpenBao 2 — bóveda de secretos + KMS (docs 04 §7 y 06 §3).
  #   transit → firma de anclas del ledger y evidencia (cak-ledger-anchor, ed25519)
  #             + envelope encryption si se cifra en reposo (cak-master-key)
  #   kv-v2   → secretos de la app y claves BYOK de proveedores de IA
  # Modo producción (Raft + TLS 1.3), nunca `-dev`. El bootstrap idempotente lo
  # corre dev-up.sh. Secretos de dev en openbao/.secrets (gitignored).
  # ---------------------------------------------------------------------------
  openbao:
    image: openbao/openbao:2.6.0
    container_name: cak-openbao
    cap_add:
      - IPC_LOCK
    environment:
      BAO_ADDR: "https://127.0.0.1:8200"
      BAO_SKIP_VERIFY: "true"   # CLI/healthcheck dentro del container (cert self-signed); la app valida con la CA
    ports:
      - "8200:8200"
    command: ["server", "-config=/openbao/config.hcl"]
    volumes:
      - openbao_data:/openbao/file
      - ./openbao/config.hcl:/openbao/config.hcl:ro
      - ./openbao/policies:/openbao/policies:ro
      - ./openbao/bootstrap.sh:/openbao/bootstrap.sh:ro
      - ./openbao/unseal.sh:/openbao/unseal.sh:ro
      - ./openbao/tls:/openbao/tls:ro
      - ./openbao/.secrets:/openbao/.secrets
    healthcheck:
      # Healthy = el server responde (sellado o no): `bao status` imprime "Sealed ..." si está up.
      test: ["CMD-SHELL", "bao status 2>&1 | grep -q Sealed"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # Prometheus — recolección de métricas (pull) y evaluación de alertas.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: cak-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # Alertmanager — agrupa, inhibe y rutea las alertas (email → Mailpit en dev).
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: cak-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # Mailpit — SMTP de prueba con bandeja web. Triple uso en CodeAlkimia:
  # (1) circuito de alertas end-to-end en dev; (2) interceptor de mails del
  # harness de equivalencia (doc 01 §3.5); (3) notificaciones de consola en dev.
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:v1.30.5
    container_name: cak-mailpit
    ports:
      - "8025:8025"   # UI web (bandeja)
      - "1025:1025"   # SMTP
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # Grafana — tableros aprovisionados desde archivo (el JSON del repo es la
  # fuente de la verdad, no la UI).
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: cak-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # Exporters y medidores de infraestructura. SeaweedFS y OpenBao exponen
  # métricas Prometheus nativas y no necesitan exporter.
  # ---------------------------------------------------------------------------

  # PostgreSQL → métrica pg_up (+ conexiones, locks, tamaño…)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.20.1
    container_name: cak-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cak-network

  # Host (CPU, RAM, DISCO, red de la máquina)
  node-exporter:
    image: prom/node-exporter:v1.12.1
    container_name: cak-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - cak-network

  # Uso por contenedor (CPU/RAM/IO de cada container)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cak-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - cak-network

  # ---------------------------------------------------------------------------
  # cak-node — contenedor de build del monorepo TypeScript.
  # Queda idle; los builds se disparan con `docker exec` vía Makefile, corriendo
  # con el uid/gid del usuario del host (artefactos owned por el usuario).
  # Cache de pnpm/corepack en ./node-cache (bind, gitignored, owned por el user).
  # ---------------------------------------------------------------------------
  cak-node:
    build: ./node
    image: cak-node:local
    container_name: cak-node
    working_dir: /workspace
    ports:
      - "4200:4200"   # ng serve de la consola (make serve-console)
    environment:
      COREPACK_HOME: /cache/corepack
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      # El store de pnpm vive DENTRO del workspace (gitignored): pnpm necesita
      # hardlinks entre store y node_modules, imposibles entre bind mounts distintos.
      npm_config_store_dir: /workspace/.pnpm-store
    volumes:
      - ../codealkimia:/workspace
      - ./node-cache:/cache
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
    networks:
      - cak-network

# -----------------------------------------------------------------------------
# Volúmenes nombrados — persisten entre down y up; se borran solo con
# ./scripts/dev-down.sh --wipe
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  seaweed_data:
    driver: local
  openbao_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local

networks:
  cak-network:
    driver: bridge
    name: cak-network
